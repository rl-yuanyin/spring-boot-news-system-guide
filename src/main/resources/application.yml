server:
  port: 8080

spring:
  application:
    name: blog-system

  # MySQL 数据源配置（通过环境变量设置密码：MYSQL_USERNAME / MYSQL_PASSWORD）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/blog_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:

  # 文件上传大小限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# MyBatis-Plus 配置
mybatis-plus:
  # 实体类包路径
  type-aliases-package: com.blog.entity
  # Mapper XML 文件路径
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 下划线转驼峰
    map-underscore-to-camel-case: true
    # SQL 日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键策略：自增
      id-type: auto
      # 逻辑删除字段名
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j 接口文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# SpringDoc 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.blog.controller

# 文件上传路径
file:
  upload:
    path: ./uploads
    allowed-extensions: jpg,jpeg,png,gif

# JWT 配置
jwt:
  secret: blog-system-secret-key-for-jwt-token-generation-2024
  expiration: 86400000  # 24小时，单位毫秒
